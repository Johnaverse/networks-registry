name: Sync upstream main into feature/github-page

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (default branch)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote and fetch
        run: |
          git remote add upstream https://github.com/graphprotocol/networks-registry.git
          git fetch --prune origin
          git fetch --prune upstream main

      - name: Merge upstream/main into feature/github-page and push
        run: |
          set -euo pipefail
          TARGET_BRANCH="feature/github-page"

          # Ensure local branch matches your fork branch (even on a fresh runner)
          git checkout -B "$TARGET_BRANCH" "origin/$TARGET_BRANCH"

          # Merge upstream main into it (merge-based sync, preserves extra commits)
          git merge "upstream/main" --no-edit

          # Push back to your fork
          git push origin "$TARGET_BRANCH"
