name: Sync Fork with Upstream

on:
  schedule:
    # Run every day at 3 AM UTC
    - cron: '0 3 * * *'
  workflow_dispatch:  # Allows manual trigger from Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # Fetch all history
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/graphprotocol/networks-registry.git
          git fetch upstream
      
      - name: Sync main branch
        run: |
          git checkout main
          git merge upstream/main --no-edit
          git push origin main

      - name: Sync feature/github-page branch
        run: |
          echo "Syncing feature/github-page branch..."
          git checkout feature/github-page
          git merge upstream/main --no-edit
          git push origin feature/github-page
          echo "✓ feature/github-page branch synced"