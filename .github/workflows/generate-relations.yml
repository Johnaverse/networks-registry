name: Generate Relations MD Files

on:
  push:
    branches:
      - main
    paths:
      - 'public/TheGraphNetworksRegistry.json'  # Only run when registry changes
      - 'scripts/generate_relations_md_fullchain.py'  # Or when script changes
  workflow_dispatch:  # Allows manual trigger

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run generation script
        run: python scripts/generate_relations_md_fullchain.py
      
      - name: Check generated files
        run: |
          echo "Generated files:"
          ls -la docs/l2Of.md docs/testnetOf.md
      
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Commit and push generated files
        run: |
          git add docs/l2Of.md docs/testnetOf.md
          
          if git diff --staged --quiet; then
            echo "✓ No changes to commit"
          else
            echo "✓ Changes detected, committing..."
            git commit -m "Auto-generate l2Of.md and testnetOf.md [skip ci]"
            git push
            echo "✓ Files pushed successfully"
          fi